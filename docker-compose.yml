services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - shegou-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - shegou-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: shegou:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      UPLOADS_DIR: /app/public/uploads
      UPLOADS_PUBLIC_PATH: /uploads
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      EVOLUTION_BASE_URL: ${EVOLUTION_BASE_URL:-}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-}
    volumes:
      - shegou-uploads:/app/public/uploads
    labels:
      - traefik.enable=true
      - traefik.docker.network=shegou-net
      - traefik.http.routers.shegou.rule=Host(`${APP_DOMAIN}`)
      - traefik.http.routers.shegou.entrypoints=websecure
      - traefik.http.routers.shegou.tls=true
      - traefik.http.routers.shegou.tls.certresolver=letsencrypt
      - traefik.http.services.shegou.loadbalancer.server.port=3000
    networks:
      - shegou-net

volumes:
  shegou-postgres-data:
  shegou-uploads:

networks:
  shegou-net:
    name: shegou-net
    driver: bridge
